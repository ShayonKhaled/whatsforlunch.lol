baseURL = "https://shayonkhaled.github.io/whatsforlunch.lol/"
title   = "what's for lunch?"
languageCode = "en-us"
theme = "hello-friend-ng"

enableRobotsTXT = true
enableEmoji     = true

[pagination]
  pagerSize = 10

[params]
  dateform        = "Jan 2, 2006"
  dateformShort   = "Jan 2"
  dateformNum     = "2006-01-02"
  dateformNumTime = "2006-01-02 15:04"

  description = "a discord bot that posts the daily cafeteria menu to your server every weekday at 9:00 AM JST."
  keywords    = "discord bot, cafeteria menu, lunch, university, haha, whee"

  homeSubtitle = "daily lunch menus, delivered to your discord server."

  enableThemeToggle    = true
  enableSharingButtons = false
  enableReadingTime    = false
  disableReadOtherPosts = true

  customCSS = ["css/custom.css"]

  [params.author]
    name = "what's for lunch?"

  [params.footer]
    trademark = 2026
    rss       = false
    copyright = true
    author    = false
    bottomText = [
      "Built with <a href=\"https://gohugo.io\" target=\"_blank\">Hugo</a> · Powered by <a href=\"https://n8n.io\" target=\"_blank\">n8n</a> & <a href=\"https://anthropic.com\" target=\"_blank\">Claude</a>",
      "This project is open source · <a href=\"https://github.com/ShayonKhaled/Campus-Lunch-Pipeline\" target=\"_blank\">Pipeline</a> · <a href=\"https://github.com/ShayonKhaled/Whats-for-Lunch-Discord-Bot\" target=\"_blank\">Discord Bot</a>"
    ]

  [params.logo]
    logoText     = "what's for lunch?"

  [params.favicon.color]
    mask         = "#1b1c1d"
    msapplication = "#1b1c1d"
    theme        = "#1b1c1d"

  [[params.social]]
    name = "github"
    url  = "https://github.com/"

[menu]
  [[menu.main]]
    identifier = "home"
    name       = "home"
    url        = "/"
    weight     = 1

  [[menu.main]]
    identifier = "how-it-works"
    name       = "how it works"
    url        = "how-it-works/"
    weight     = 2

  [[menu.main]]
    identifier = "commands"
    name       = "commands"
    url        = "commands/"
    weight     = 3

[languages]
  [languages.en]
    weight    = 1
    copyright = "an independent student project. not affiliated with the university."
